# Per-project cargo settings.
#
# rust-analyzer ALSO reads [build] target, so setting the target here makes
# BOTH `cargo build` and the editor use it — usually no editor config needed.

# ── Cross-compile to a prebuilt target ───────────────────────────────────
# 1. add the triple to `extraTargets` in flake.nix
# 2. uncomment:
# [build]
# target = "i686-unknown-linux-gnu"

# ── Bare-metal / custom JSON target (no_std) ─────────────────────────────
# Requires nightly: set channelName = "complete" in flake.nix.
# Put your <target>.json next to this project.
# [build]
# target = "i386-unknown-none.json"
#
# [unstable]
# build-std = ["core", "compiler_builtins", "alloc"]
# build-std-features = ["compiler-builtins-mem"]

# ── Custom linker (e.g. for embedded) ────────────────────────────────────
# [target.thumbv7em-none-eabihf]
# rustflags = ["-C", "link-arg=-Tlink.x"]
